services:
  postgres:
    image: postgres:16-alpine
    container_name: nela-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nela
    volumes:
      - nela_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nela"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nela-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nela_redis_data:/data
    profiles:
      - redis

volumes:
  nela_pg_data:
  nela_redis_data:
